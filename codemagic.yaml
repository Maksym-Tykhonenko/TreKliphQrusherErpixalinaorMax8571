workflows:
  sample-workflow:
    name: Fish Explorer Japan
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: FishExplorerJapanApiKeyNew
    environment:
      xcode: 26.0
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tershe.qwishe.eprixlon.app
      vars:
        APP_STORE_APPLE_ID: 6772095467
        BUNDLE_ID: 'com.tershe.qwishe.eprixlon.app'
        XCODE_WORKSPACE: 'TreKliphQrusherErpixalinaor.xcworkspace'
        XCODE_SCHEME: 'TreKliphQrusherErpixalinaor'
    scripts:
      - name: Install node modules
        script: |
          npm install
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Set up provisioning profile settings on  Xcode project
        script: |
          cd ios
          xcode-project use-profiles
      - name: Set build number
        script: |
          cd $CM_BUILD_DIR/ios
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 3" TreKliphQrusherErpixalinaor/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.1" TreKliphQrusherErpixalinaor/Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" TreKliphQrusherErpixalinaor/Info.plist
      - name: Set Info.plist values
        script: |
          PLIST=$CM_BUILD_DIR/ios/AwesomeProject/Info.plist
          PLIST_BUDDY=/usr/libexec/PlistBuddy
          $PLIST_BUDDY -c "Add :ITSAppUsesNonExemptEncryption bool false" $PLIST
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/ios/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_app_store: true
        copyright: Kamilla Brodersen
